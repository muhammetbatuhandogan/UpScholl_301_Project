services:
  - type: web
    name: upscholl-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OTP_DEBUG
        value: "false"
      - key: ENABLE_NOTIFICATION_SCHEDULER
        value: "false"
      - key: CORS_ORIGINS
        sync: false
