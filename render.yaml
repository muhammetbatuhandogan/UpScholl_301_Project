services:
  - type: web
    name: upscholl-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OTP_DEBUG
        value: "false"
      - key: ENABLE_NOTIFICATION_SCHEDULER
        value: "false"
      - key: CORS_ORIGINS
        value: "https://upscholl-301-project.pages.dev,http://localhost:5173"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: "gemini-2.5-flash"
