name: Keep backend awake

# Render free plan puts the service to sleep after ~15 minutes of inactivity,
# which causes 30-60s cold starts. This pings /health every 10 minutes to
# keep it warm. Note: GitHub cron is best-effort and may drift a few minutes.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          set -e
          URL="${{ vars.BACKEND_HEALTH_URL || 'https://upscholl-api.onrender.com/health' }}"
          echo "Pinging $URL"
          # Retry up to 6 times (cold start can take ~60s)
          for i in $(seq 1 6); do
            if curl -fsS --max-time 20 "$URL"; then
              echo "OK"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Backend did not respond" >&2
          exit 1
