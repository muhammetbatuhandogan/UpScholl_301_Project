name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: upscholl
          POSTGRES_PASSWORD: upscholl_dev
          POSTGRES_DB: upscholl
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U upscholl -d upscholl"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://upscholl:upscholl_dev@localhost:5432/upscholl
        run: python -m alembic upgrade head

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://upscholl:upscholl_dev@localhost:5432/upscholl
        run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_URL: http://localhost:4010
        run: npm run build --workspace frontend

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t upscholl-api:test ./backend
